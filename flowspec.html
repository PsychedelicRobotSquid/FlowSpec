// ---------- File System Access API (Chrome/Edge) ----------
const FS_SUPPORTED = 'showOpenFilePicker' in window && 'showSaveFilePicker' in window;
const DB_NAME = 'flowspec-fs';
const DB_STORE = 'handles';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(DB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbGet(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbSet(key, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(value, key);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}
async function dbDel(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete(key);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}
async function dbAllKeys() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).getAllKeys();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

// Per-project linked file handle (FileSystemFileHandle). Stored as 'file:<projectId>'.
async function ensurePermission(handle, mode = 'readwrite') {
  if (!handle) return false;
  if ((await handle.queryPermission({ mode })) === 'granted') return true;
  return (await handle.requestPermission({ mode })) === 'granted';
}

function setStatus(msg, durationMs = 3000) {
  const el = document.getElementById('status-text');
  if (!el) return;
  el.textContent = msg;
  if (el._timeout) clearTimeout(el._timeout);
  el._timeout = setTimeout(() => {
    el.textContent = state.nodes.length === 0 ? 'Click a node type to add it.' : '';
  }, durationMs);
}

// ---------- Linked file + dirty state ----------
function linkedMeta() {
  const ws = loadWorkspace();
  const p = ws.projects[state.currentProjectId];
  if (!p) return { hasLink: false, name: null };
  return { hasLink: !!p.hasLink, name: p.linkName || null };
}

function markDirty() {
  if (state.dirty) return;
  state.dirty = true;
  // Persist dirty flag in workspace
  const ws = loadWorkspace();
  const p = ws.projects[state.currentProjectId];
  if (p) { p.dirty = true; saveWorkspace(ws); }
  renderLinkedState();
}
function clearDirty() {
  state.dirty = false;
  const ws = loadWorkspace();
  const p = ws.projects[state.currentProjectId];
  if (p) { p.dirty = false; saveWorkspace(ws); }
  renderLinkedState();
}

function renderLinkedState() {
  const { hasLink, name } = linkedMeta();
  const dotEl = document.getElementById('dirty-dot');
  const chipEl = document.getElementById('linked-chip');
  const nameEl = document.getElementById('linked-name');
  if (dotEl) dotEl.style.display = state.dirty ? '' : 'none';
  if (chipEl && nameEl) {
    if (hasLink && name) {
      nameEl.textContent = name;
      chipEl.style.display = '';
    } else {
      chipEl.style.display = 'none';
    }
  }
  // Update browser tab title too
  const baseTitle = state.title || 'Untitled flow';
  document.title = (state.dirty ? '• ' : '') + baseTitle + ' — FlowSpec';
}

async function setLinkedFile(handle, name) {
  const ws = loadWorkspace();
  const p = ws.projects[state.currentProjectId];
  if (!p) return;
  if (handle) {
    await dbSet('file:' + state.currentProjectId, handle);
    p.hasLink = true;
    p.linkName = name || handle.name;
  } else {
    try { await dbDel('file:' + state.currentProjectId); } catch(e) {}
    p.hasLink = false;
    p.linkName = null;
  }
  saveWorkspace(ws);
  renderLinkedState();
}

async function getLinkedHandle() {
  try { return await dbGet('file:' + state.currentProjectId); }
  catch(e) { return null; }
}

// ---------- Open ----------
async function openFile() {
  if (!FS_SUPPORTED) {
    document.getElementById('open-file-fallback').click();
    return;
  }
  try {
    const [fileHandle] = await window.showOpenFilePicker({
      types: [{
        description: 'FlowSpec project',
        accept: { 'application/json': ['.json', '.flowspec.json'] },
      }],
      multiple: false,
    });
    const file = await fileHandle.getFile();
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.nodes || !Array.isArray(data.nodes)) throw new Error('Not a FlowSpec file');
    await applyOpenedFile(data, file.name, fileHandle);
    setStatus('Opened: ' + file.name);
  } catch(e) {
    if (e.name !== 'AbortError') alert('Could not open: ' + e.message);
  }
}

async function applyOpenedFile(data, filename, fileHandle) {
  state.loading = true;
  // Each opened file becomes its own new project
  state.currentProjectId = 'proj_' + Date.now();
  state.title = data.title || filename.replace(/\.flowspec\.json$/, '').replace(/\.json$/, '');
  state.nodes = data.nodes || [];
  state.edges = data.edges || [];
  state.nextId = data.nextId || (state.nodes.length + state.edges.length + 1);
  state.pan = { x: 0, y: 0 };
  state.zoom = 1;
  state.undoStack = [];
  state.redoStack = [];
  state.dirty = false;
  clearSelection();
  document.getElementById('title-input').value = state.title;
  save();
  if (fileHandle) {
    await setLinkedFile(fileHandle, filename);
  } else {
    // Fallback path — no handle, but remember the name so we still suggest it
    const ws = loadWorkspace();
    const p = ws.projects[state.currentProjectId];
    if (p) { p.hasLink = false; p.linkName = filename; saveWorkspace(ws); }
  }
  state.loading = false;
  state.dirty = false;
  renderLinkedState();
  render();
  closeProjectsModal();
}

// ---------- Save ----------
async function saveFile() {
  if (!FS_SUPPORTED) { return saveFileAs(); }
  const handle = await getLinkedHandle();
  if (!handle) { return saveFileAs(); }
  if (!(await ensurePermission(handle, 'readwrite'))) {
    alert('Permission denied for the linked file. Use Save As to choose a new location.');
    return;
  }
  try {
    const writable = await handle.createWritable();
    await writable.write(JSON.stringify(serializeProject(), null, 2));
    await writable.close();
    clearDirty();
    setStatus('Saved: ' + handle.name);
  } catch(e) {
    console.warn('Save failed', e);
    alert('Save failed: ' + e.message);
  }
}

async function saveFileAs() {
  if (!FS_SUPPORTED) {
    // Fallback: trigger a download
    const blob = new Blob([JSON.stringify(serializeProject(), null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = suggestedFilename(state.title);
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    clearDirty();
    // Cache the suggested name as link metadata for display, even though no handle exists
    const ws = loadWorkspace();
    const p = ws.projects[state.currentProjectId];
    if (p) { p.hasLink = false; p.linkName = suggestedFilename(state.title); saveWorkspace(ws); }
    setStatus('Downloaded: ' + suggestedFilename(state.title));
    return;
  }
  try {
    const handle = await window.showSaveFilePicker({
      suggestedName: suggestedFilename(state.title),
      types: [{
        description: 'FlowSpec project',
        accept: { 'application/json': ['.flowspec.json', '.json'] },
      }],
    });
    const writable = await handle.createWritable();
    await writable.write(JSON.stringify(serializeProject(), null, 2));
    await writable.close();
    await setLinkedFile(handle, handle.name);
    clearDirty();
    setStatus('Saved: ' + handle.name);
  } catch(e) {
    if (e.name !== 'AbortError') alert('Save As failed: ' + e.message);
  }
}

// ---------- Spec save ----------
const SPEC_FORMAT_META = {
  markdown:  { ext: 'md',   mime: 'text/markdown',  suffix: '.spec',  desc: 'Markdown' },
  narrative: { ext: 'txt',  mime: 'text/plain',     suffix: '.spec',  desc: 'Plain text' },
  tree:      { ext: 'txt',  mime: 'text/plain',     suffix: '.tree',  desc: 'Plain text' },
  json:      { ext: 'json', mime: 'application/json', suffix: '.spec', desc: 'JSON' },
  mermaid:   { ext: 'mmd',  mime: 'text/plain',     suffix: '',       desc: 'Mermaid' },
};

async function saveSpec() {
  const out = document.getElementById('output-text');
  if (!out) return;
  const text = out.textContent || '';
  const meta = SPEC_FORMAT_META[state.format] || SPEC_FORMAT_META.markdown;
  const base = sanitizeForFilename(state.title);
  const suggestedName = base + meta.suffix + '.' + meta.ext;

  if (FS_SUPPORTED) {
    try {
      const options = {
        suggestedName,
        types: [{
          description: meta.desc + ' file',
          accept: { [meta.mime]: ['.' + meta.ext] },
        }],
      };
      // If this project is linked to a .flowspec.json, open the dialog next to it
      const linkedHandle = await getLinkedHandle();
      if (linkedHandle) options.startIn = linkedHandle;
      const handle = await window.showSaveFilePicker(options);
      const writable = await handle.createWritable();
      await writable.write(text);
      await writable.close();
      setStatus('Saved spec: ' + handle.name);
    } catch(e) {
      if (e.name !== 'AbortError') alert('Save failed: ' + e.message);
    }
    return;
  }
  // Fallback: download
  const blob = new Blob([text], { type: meta.mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = suggestedName;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  setStatus('Downloaded: ' + suggestedName);
}

// ---------- Export menu ----------
function exportJsonCopy() {
  const blob = new Blob([JSON.stringify(serializeProject(), null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = suggestedFilename(state.title);
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  setStatus('Exported copy: ' + suggestedFilename(state.title));
}

// Unlink the current project's file
document.getElementById('linked-unlink').addEventListener('click', async () => {
  await setLinkedFile(null);
  setStatus('Unlinked file from this project.');
});

// Header buttons
document.getElementById('open-btn').addEventListener('click', openFile);
document.getElementById('save-btn').addEventListener('click', saveFile);
document.getElementById('save-as-btn').addEventListener('click', saveFileAs);

// Open-file fallback for non-FS-API browsers
document.getElementById('open-file-fallback').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.nodes || !Array.isArray(data.nodes)) throw new Error('Not a FlowSpec file');
    await applyOpenedFile(data, file.name, null);
    setStatus('Opened: ' + file.name);
  } catch(err) {
    alert('Could not open: ' + err.message);
  }
  e.target.value = '';
});

// Generic helper to wire a dropdown button + outside-click close
function wireDropdown(dropdownId, btnId) {
  const dd = document.getElementById(dropdownId);
  const btn = document.getElementById(btnId);
  if (!dd || !btn) return;
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    // Close other dropdowns
    document.querySelectorAll('.dropdown.open').forEach(d => { if (d !== dd) d.classList.remove('open'); });
    dd.classList.toggle('open');
  });
}
wireDropdown('export-dropdown', 'export-menu-btn');
wireDropdown('more-dropdown', 'more-menu-btn');
wireDropdown('add-dropdown', 'add-menu-btn');

// Global click closes any open dropdown
document.addEventListener('click', (e) => {
  document.querySelectorAll('.dropdown.open').forEach(dd => {
    if (!dd.contains(e.target)) dd.classList.remove('open');
  });
});

// Export menu items
document.querySelectorAll('#export-menu .dropdown-item').forEach(item => {
  item.addEventListener('click', () => {
    document.getElementById('export-dropdown').classList.remove('open');
    const what = item.dataset.export;
    if (what === 'json-copy') exportJsonCopy();
    else if (what === 'png') exportPng();
    else if (what === 'spec') {
      state.panTab = 'spec';
      applyPanelCollapsed(false);
      render();
    }
  });
});

// More menu items (mobile only — these re-route to existing handlers)
document.querySelectorAll('#more-menu .dropdown-item').forEach(item => {
  item.addEventListener('click', () => {
    document.getElementById('more-dropdown').classList.remove('open');
    const what = item.dataset.more;
    switch (what) {
      case 'spec':
        state.panTab = 'spec';
        applyPanelCollapsed(false);
        render();
        break;
      case 'projects': openProjectsModal(); break;
      case 'open': openFile(); break;
      case 'save': saveFile(); break;
      case 'save-as': saveFileAs(); break;
      case 'export-json': exportJsonCopy(); break;
      case 'export-png': exportPng(); break;
    }
  });
});

// Fullscreen toggle (hide header + toolbar for maximum canvas)
function toggleFullscreen(force) {
  const want = typeof force === 'boolean' ? force : !document.body.classList.contains('fullscreen');
  document.body.classList.toggle('fullscreen', want);
}
document.getElementById('fullscreen-btn').addEventListener('click', () => toggleFullscreen());
document.getElementById('exit-fullscreen-btn').addEventListener('click', () => toggleFullscreen(false));

// Tools toggle (hide just the toolbar, keep header)
function applyToolsCollapsed(collapsed) {
  document.body.classList.toggle('tools-collapsed', collapsed);
  const btn = document.getElementById('tools-toggle-btn');
  if (btn) btn.textContent = collapsed ? '⌄' : '⌃';
  // Persist on desktop only — mobile session always defaults collapsed
  if (!isMobileViewport()) {
    try { localStorage.setItem('flowspec.toolsCollapsed', collapsed ? '1' : '0'); } catch(e) {}
  }
}
document.getElementById('tools-toggle-btn').addEventListener('click', () => {
  applyToolsCollapsed(!document.body.classList.contains('tools-collapsed'));
});

// Save / Open keyboard shortcuts
document.addEventListener('keydown', (ev) => {
  if (ev.key === 's' && (ev.metaKey || ev.ctrlKey)) {
    ev.preventDefault();
    if (ev.shiftKey) saveFileAs(); else saveFile();
  } else if (ev.key === 'o' && (ev.metaKey || ev.ctrlKey)) {
    ev.preventDefault();
    openFile();
  }
});

// ---------- PNG Export ----------
async function exportPng() {
  if (state.nodes.length === 0) {
    alert('Nothing to export.');
    return;
  }
  // Compute bounding box of content
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const n of state.nodes) {
    const b = nodeBounds(n);
    if (b.x < minX) minX = b.x;
    if (b.y < minY) minY = b.y;
    if (b.x + b.w > maxX) maxX = b.x + b.w;
    if (b.y + b.h > maxY) maxY = b.y + b.h;
  }
  const padding = 40;
  const w = Math.ceil(maxX - minX + padding * 2);
  const h = Math.ceil(maxY - minY + padding * 2);
  // Build a standalone SVG by cloning current edges/nodes layers
  const theme = document.documentElement.getAttribute('data-theme') || 'dark';
  const bg = getComputedStyle(document.body).getPropertyValue('--canvas-bg').trim() || (theme === 'dark' ? '#1f1f1d' : '#fafaf7');
  const styles = document.querySelector('style').textContent;
  const edgesClone = edgesLayer.cloneNode(true);
  const nodesClone = nodesLayer.cloneNode(true);
  edgesClone.setAttribute('transform', `translate(${-minX + padding},${-minY + padding})`);
  nodesClone.setAttribute('transform', `translate(${-minX + padding},${-minY + padding})`);
  // Strip event-only hit paths so they don't appear; they're invisible anyway
  const xmlns = 'http://www.w3.org/2000/svg';
  const out = document.createElementNS(xmlns, 'svg');
  out.setAttribute('xmlns', xmlns);
  out.setAttribute('width', w);
  out.setAttribute('height', h);
  out.setAttribute('viewBox', `0 0 ${w} ${h}`);
  out.setAttribute('data-theme', theme);
  // Background rect
  const bgRect = document.createElementNS(xmlns, 'rect');
  bgRect.setAttribute('width', w);
  bgRect.setAttribute('height', h);
  bgRect.setAttribute('fill', bg);
  out.appendChild(bgRect);
  // Inline arrow markers
  const defs = document.createElementNS(xmlns, 'defs');
  defs.innerHTML = svg.querySelector('defs').innerHTML;
  out.appendChild(defs);
  // Inline styles so themed colors resolve in the rasterized image
  const styleEl = document.createElementNS(xmlns, 'style');
  styleEl.textContent = styles;
  out.appendChild(styleEl);
  out.appendChild(edgesClone);
  out.appendChild(nodesClone);

  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(out);
  const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  img.onload = () => {
    const scale = 2; // retina-ish
    const canvas = document.createElement('canvas');
    canvas.width = w * scale;
    canvas.height = h * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    canvas.toBlob((blob) => {
      const dl = document.createElement('a');
      dl.href = URL.createObjectURL(blob);
      dl.download = sanitizeFolderName(state.title) + '.png';
      dl.click();
      setTimeout(() => URL.revokeObjectURL(dl.href), 1000);
    }, 'image/png');
  };
  img.onerror = (e) => {
    URL.revokeObjectURL(url);
    alert('PNG export failed. Try exporting JSON instead.');
  };
  img.src = url;
}
document.querySelectorAll('.panel-tab').forEach(t => {
  t.addEventListener('click', () => {
    state.panTab = t.dataset.tab;
    if (state.panelCollapsed) applyPanelCollapsed(false);
    renderPanel();
  });
});

state.loading = false;
if (!loaded) {
  newProject(true);
} else {
  document.getElementById('title-input').value = state.title;
  updateUndoRedoButtons();
  render();
  renderLinkedState();
}

// Apply theme button label
applyTheme(document.documentElement.getAttribute('data-theme') || 'dark');

// Right-panel collapsed state: mobile always defaults collapsed; desktop restores from localStorage
if (isMobileViewport()) {
  applyPanelCollapsed(true);
} else {
  try {
    const c = localStorage.getItem('flowspec.panelCollapsed') === '1';
    applyPanelCollapsed(c);
  } catch(e) { applyPanelCollapsed(false); }
}

// Toolbar collapsed state: mobile defaults collapsed; desktop restores from localStorage
if (isMobileViewport()) {
  applyToolsCollapsed(true);
} else {
  try {
    const c = localStorage.getItem('flowspec.toolsCollapsed') === '1';
    applyToolsCollapsed(c);
  } catch(e) { applyToolsCollapsed(false); }
}

// One-time cleanup of obsolete IndexedDB keys (workspace dir handle, per-project dir handles)
(async function migrateOldFsKeys() {
  try {
    await dbDel('workspace');
    const keys = await dbAllKeys();
    for (const k of keys) {
      if (typeof k === 'string' && k.startsWith('proj:')) {
        await dbDel(k);
      }
    }
  } catch(e) {}
})();
