<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowSpec — Visual flowchart → LLM-friendly text</title>
<script>
  // Apply saved theme before CSS paints to avoid flash
  try {
    const t = localStorage.getItem('flowspec.theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  } catch(e) {}
</script>
<style>
  /* ---------- Theme variables ---------- */
  :root, [data-theme="dark"] {
    --bg:           #1a1a18;
    --surface:      #232321;
    --surface-2:    #2c2c2a;
    --surface-3:    #1a1a18;
    --text:         #e8e5dc;
    --text-muted:   #9a9893;
    --text-faint:   #6a6864;
    --border:       #3a3a37;
    --border-light: #2c2c2a;
    --accent:       #c0dd97;
    --accent-text:  #1a1a18;
    --canvas-bg:    #1f1f1d;
    --canvas-dot:   #33332f;
    --field-bg:     #2c2c2a;
    --field-bg-focus:#1a1a18;
    --hover-bg:     #2c2c2a;
    --kbd-bg:       #2c2c2a;
    --danger-text:  #f0a3a3;
    --danger-border:#5a2929;
    --danger-bg:    #3a1f1f;
    --output-bg:    #131311;
    --output-head:  #0d0d0c;
    --output-text:  #e8e5dc;
    --output-desc:  #b4b2a9;
    --output-btn:   #2c2c2a;
    --output-btn-h: #3a3a37;
    --node-stroke-default: #888780;
    --shadow:       0 8px 32px rgba(0,0,0,0.5);
    --modal-overlay:rgba(0,0,0,0.6);
  }
  [data-theme="light"] {
    --bg:           #f7f6f1;
    --surface:      #ffffff;
    --surface-2:    #fafaf7;
    --surface-3:    #f1efe8;
    --text:         #2c2c2a;
    --text-muted:   #5f5e5a;
    --text-faint:   #888780;
    --border:       #e8e5dc;
    --border-light: #d3d1c7;
    --accent:       #2c2c2a;
    --accent-text:  #ffffff;
    --canvas-bg:    #fafaf7;
    --canvas-dot:   #e0ddd2;
    --field-bg:     #fafaf7;
    --field-bg-focus:#ffffff;
    --hover-bg:     #fafaf7;
    --kbd-bg:       #f1efe8;
    --danger-text:  #791f1f;
    --danger-border:#f0caca;
    --danger-bg:    #fceaea;
    --output-bg:    #2c2c2a;
    --output-head:  #1f1f1d;
    --output-text:  #e8e5dc;
    --output-desc:  #b4b2a9;
    --output-btn:   #444441;
    --output-btn-h: #5f5e5a;
    --node-stroke-default: #888780;
    --shadow:       0 8px 32px rgba(0,0,0,0.15);
    --modal-overlay:rgba(44, 44, 42, 0.4);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    height: 100dvh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    overflow: hidden;
    overscroll-behavior: contain;
    -webkit-text-size-adjust: 100%;
  }
  body { display: flex; flex-direction: column; }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 14px; font-weight: 600; margin: 0;
    color: var(--text); letter-spacing: -0.01em;
  }
  header h1 .tag { color: var(--text-faint); font-weight: 400; margin-left: 6px; font-size: 12px; }
  header .title-wrap {
    flex: 1; min-width: 0; max-width: 520px;
    display: flex; align-items: center; gap: 8px;
  }
  header .title-input {
    flex: 1; min-width: 0; max-width: 320px;
    padding: 6px 10px;
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; background: var(--field-bg); color: var(--text);
    font-family: inherit;
  }
  header .title-input:focus { outline: none; border-color: var(--text-faint); background: var(--field-bg-focus); }
  header .title-meta {
    display: flex; align-items: center; gap: 6px;
    min-width: 0;
  }
  .dirty-dot {
    color: var(--accent); font-size: 18px; line-height: 1;
    font-weight: 700;
    user-select: none;
  }
  .linked-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px;
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px; color: var(--text-muted);
    font-family: ui-monospace, monospace;
    max-width: 220px;
  }
  .linked-chip .linked-name {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .linked-chip .linked-unlink {
    background: none; border: none; cursor: pointer;
    color: var(--text-faint); padding: 0 2px;
    font-size: 14px; line-height: 1;
    font-family: inherit;
  }
  .linked-chip .linked-unlink:hover { color: var(--danger-text); }

  header .actions { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }

  /* Dropdown menu */
  .dropdown { position: relative; display: inline-block; }
  .dropdown-menu {
    position: absolute; top: 100%; right: 0; margin-top: 4px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; box-shadow: var(--shadow);
    min-width: 220px; padding: 4px;
    z-index: 50; display: none;
  }
  .dropdown.open .dropdown-menu { display: block; }
  .dropdown-item {
    display: block; width: 100%; text-align: left;
    padding: 7px 10px; font-size: 13px;
    background: none; border: none;
    color: var(--text); cursor: pointer;
    border-radius: 4px;
    font-family: inherit;
  }
  .dropdown-item:hover { background: var(--hover-bg); }

  .btn {
    padding: 6px 12px;
    border: 1px solid var(--border-light); border-radius: 6px;
    background: var(--surface); color: var(--text);
    font-size: 13px; cursor: pointer;
    font-family: inherit;
    transition: background 0.1s, border-color 0.1s;
  }
  .btn:hover { background: var(--hover-bg); border-color: var(--text-faint); }
  .btn:active { transform: scale(0.98); }
  .btn.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent); opacity: 0.9; }
  .btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
  .btn.danger { color: var(--danger-text); border-color: var(--danger-border); }
  .btn.danger:hover { background: var(--danger-bg); }
  .btn.icon { padding: 6px 8px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .toolbar {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 12px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .toolbar .group { display: flex; gap: 4px; padding-right: 10px; border-right: 1px solid var(--border); }
  .toolbar .group:last-child { border-right: none; }
  .toolbar .add-node-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px;
  }
  .toolbar .add-node-btn .dot { width: 10px; height: 10px; border-radius: 2px; }
  .zoom-display {
    font-size: 11px; color: var(--text-muted);
    min-width: 42px; text-align: center;
    padding: 0 4px;
    font-variant-numeric: tabular-nums;
  }

  main {
    flex: 1; display: flex; min-height: 0;
  }

  #canvas-wrap {
    flex: 1; position: relative; overflow: hidden;
    background: var(--canvas-bg);
    background-image:
      radial-gradient(circle at 1px 1px, var(--canvas-dot) 1px, transparent 0);
    background-size: 20px 20px;
  }
  #canvas {
    width: 100%; height: 100%; cursor: default; display: block;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  #canvas.connecting { cursor: crosshair; }
  #canvas.pan-ready { cursor: grab; }
  #canvas.panning { cursor: grabbing; }
  #canvas.zooming { cursor: zoom-in; }
  .marquee-rect {
    fill: rgba(192, 221, 151, 0.10);
    stroke: var(--accent);
    stroke-width: 1;
    stroke-dasharray: 4 3;
    pointer-events: none;
  }
  #canvas-wrap .hint {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85); color: #fff;
    padding: 6px 14px; border-radius: 6px;
    font-size: 12px; pointer-events: none;
    opacity: 0; transition: opacity 0.2s;
    z-index: 5;
  }
  #canvas-wrap .hint.show { opacity: 1; }
  #canvas-wrap .search-box {
    position: absolute; top: 12px; right: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px;
    display: none; align-items: center; gap: 4px;
    box-shadow: var(--shadow); z-index: 10;
    width: 280px;
  }
  #canvas-wrap .search-box.open { display: flex; }
  #canvas-wrap .search-box input {
    flex: 1; padding: 5px 8px; font-size: 13px;
    background: var(--field-bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    font-family: inherit; outline: none;
  }
  #canvas-wrap .search-box input:focus { border-color: var(--text-faint); }
  #canvas-wrap .search-results {
    max-height: 200px; overflow-y: auto;
    margin-top: 4px;
  }
  #canvas-wrap .search-result {
    padding: 6px 10px; font-size: 12px;
    color: var(--text); cursor: pointer;
    border-radius: 4px;
  }
  #canvas-wrap .search-result:hover { background: var(--hover-bg); }
  #canvas-wrap .search-result .type { color: var(--text-faint); margin-left: 6px; font-size: 11px; }

  aside.panel {
    width: 320px; min-width: 320px;
    background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    transition: width 0.18s ease, min-width 0.18s ease;
  }
  aside.panel.collapsed { width: 44px; min-width: 44px; }
  aside.panel.collapsed .panel-header-row,
  aside.panel.collapsed .panel-content { display: none; }
  aside.panel:not(.collapsed) .panel-collapsed-rail { display: none; }

  .panel-header-row {
    display: flex; align-items: stretch;
    border-bottom: 1px solid var(--border);
  }
  .panel-tabs {
    flex: 1; display: flex; min-width: 0;
  }
  .panel-tab {
    flex: 1; padding: 10px 12px;
    background: none; border: none;
    font-size: 12px; font-weight: 500; color: var(--text-faint);
    cursor: pointer; font-family: inherit;
    border-bottom: 2px solid transparent;
    transition: color 0.1s, border-color 0.1s;
    white-space: nowrap;
  }
  .panel-tab.active { color: var(--text); border-bottom-color: var(--text); }
  .panel-tab:hover { color: var(--text); }
  .panel-collapse-btn {
    background: none; border: none; padding: 0 12px;
    color: var(--text-faint); cursor: pointer;
    font-size: 16px; line-height: 1;
    border-left: 1px solid var(--border);
    font-family: inherit;
  }
  .panel-collapse-btn:hover { color: var(--text); background: var(--hover-bg); }

  .panel-collapsed-rail {
    display: flex; flex-direction: column;
    padding: 6px 4px; gap: 4px;
    align-items: stretch;
  }
  .panel-collapsed-rail button {
    background: none; border: 1px solid transparent;
    padding: 8px 0; border-radius: 6px;
    color: var(--text-muted); cursor: pointer;
    font-size: 16px; line-height: 1;
    font-family: inherit;
  }
  .panel-collapsed-rail button:hover { background: var(--hover-bg); color: var(--text); }
  .panel-collapsed-rail .rail-tab.active { background: var(--surface-3); color: var(--text); }
  .panel-collapsed-rail #rail-expand {
    border-bottom: 1px solid var(--border);
    border-radius: 0;
    margin-bottom: 4px;
  }

  .panel-content {
    flex: 1; overflow-y: auto;
    padding: 14px;
  }
  .panel-content.spec-mode {
    display: flex; flex-direction: column;
    padding: 0; overflow: hidden;
  }
  .spec-head {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    flex: 0 0 auto; flex-wrap: wrap;
  }
  .spec-head select {
    flex: 1; min-width: 0;
    padding: 5px 8px; font-size: 12px;
    background: var(--field-bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    font-family: inherit;
  }
  .spec-head .btn { padding: 4px 10px; font-size: 12px; }
  .spec-desc {
    padding: 8px 12px;
    font-size: 11.5px; line-height: 1.45;
    color: var(--text-muted);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex: 0 0 auto;
  }
  .spec-desc strong { color: var(--text); font-weight: 500; }
  .spec-pre {
    flex: 1; margin: 0; padding: 12px 14px;
    overflow: auto;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 12px; line-height: 1.55;
    white-space: pre-wrap; word-break: break-word;
    color: var(--text);
    background: var(--surface-3);
  }

  .field { margin-bottom: 12px; }
  .field label {
    display: block; font-size: 11px; font-weight: 500;
    color: var(--text-muted); margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .field input, .field select, .field textarea {
    width: 100%; padding: 7px 10px;
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; font-family: inherit;
    background: var(--field-bg); color: var(--text);
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--text-faint); background: var(--field-bg-focus);
  }
  .field textarea { resize: vertical; min-height: 80px; line-height: 1.4; }
  .field .help { font-size: 11px; color: var(--text-faint); margin-top: 4px; line-height: 1.4; }
  .field .row { display: grid; gap: 6px; }
  .field .row.cols-2 { grid-template-columns: 1fr 1fr; }
  .field .row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

  .empty-state {
    color: var(--text-muted); font-size: 13px; line-height: 1.5;
    padding: 20px 4px;
  }
  .empty-state strong { color: var(--text); font-weight: 500; }
  .empty-state .kbd {
    display: inline-block;
    padding: 1px 5px;
    background: var(--kbd-bg); border: 1px solid var(--border-light);
    color: var(--text);
    border-radius: 3px; font-family: ui-monospace, monospace;
    font-size: 11px;
  }


  /* Node visual styles in SVG */
  .node-group { cursor: grab; }
  .node-group:active { cursor: grabbing; }
  .node-group.selected .node-shape {
    stroke: var(--accent); stroke-width: 3;
    filter: drop-shadow(0 0 6px var(--accent));
  }
  [data-theme="dark"] .node-group.selected .node-shape {
    filter: drop-shadow(0 0 10px var(--accent)) drop-shadow(0 0 3px var(--accent));
  }
  .node-group.connect-source .node-shape {
    stroke: #5fa5f4; stroke-width: 2.5;
    stroke-dasharray: 4 3;
  }
  .node-group.connect-hover .node-shape {
    stroke: #5fa5f4; stroke-width: 2;
  }
  .node-group.search-hit .node-shape {
    stroke: #f0c75c; stroke-width: 3;
  }
  .node-text {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-weight: 500;
    text-anchor: middle; dominant-baseline: middle;
    pointer-events: none;
    user-select: none;
  }
  .node-sub {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-weight: 400;
    text-anchor: middle; dominant-baseline: middle;
    pointer-events: none;
    user-select: none;
  }
  .edge-line { fill: none; stroke: var(--text-faint); stroke-width: 1.5; }
  .edge-line.selected { stroke: var(--accent); stroke-width: 2.5; }
  .arrow-fill { fill: var(--text-faint); }
  .arrow-fill-sel { fill: var(--accent); }
  .edge-hit { fill: none; stroke: transparent; stroke-width: 12; cursor: pointer; }
  @media (pointer: coarse) {
    .edge-hit { stroke-width: 22; }
  }
  .edge-label {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 11px; font-weight: 500; fill: var(--text);
    text-anchor: middle; dominant-baseline: middle;
    pointer-events: none;
    user-select: none;
  }
  .edge-label-bg { fill: var(--surface); stroke: var(--border); stroke-width: 1; }

  /* Responsive: stack on narrow */
  @media (max-width: 800px) {
    header { flex-wrap: wrap; row-gap: 6px; padding: 8px 10px; }
    header .title-wrap { flex-basis: 100%; max-width: 100%; order: 2; }
    header h1 { order: 1; }
    header .actions { order: 3; flex-basis: 100%; justify-content: flex-start; }
    .toolbar { padding: 6px 8px; }
    main { flex-direction: column; }
    aside.panel {
      width: 100% !important; min-width: 0 !important;
      flex-shrink: 0;
      min-height: 56dvh;
      max-height: 56dvh;
      border-left: none; border-top: 1px solid var(--border);
      transition: min-height 0.18s ease, max-height 0.18s ease;
    }
    aside.panel.collapsed {
      width: 100% !important; min-width: 0 !important;
      min-height: 44px !important;
      max-height: 44px !important;
    }
    /* At narrow widths, collapsed panel keeps the tab bar visible, not the vertical rail */
    aside.panel.collapsed .panel-header-row { display: flex !important; }
    aside.panel.collapsed .panel-collapsed-rail { display: none !important; }
    aside.panel.collapsed .panel-content { display: none; }
    /* Project-action buttons always visible on touch */
    .project-actions { opacity: 1 !important; }
    /* Dropdown menu spans more width on small screens */
    .dropdown-menu { right: auto; left: 0; min-width: 240px; }
  }

  /* Mobile / desktop visibility helpers */
  .mobile-only { display: none; }
  @media (max-width: 800px) {
    .mobile-only { display: inline-flex; }
    .desktop-only { display: none !important; }
  }

  /* Fullscreen mode — hides header + toolbar for max canvas */
  body.fullscreen header,
  body.fullscreen .toolbar { display: none; }
  /* Tools collapsed — hides just the toolbar (header still visible) */
  body.tools-collapsed .toolbar { display: none; }
  /* Hide button text labels at narrow widths — buttons become icon-only */
  @media (max-width: 800px) {
    .btn-label { display: none; }
  }
  .floating-exit-fs {
    position: fixed; top: 8px; right: 8px;
    z-index: 60;
    display: none;
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 6px;
    padding: 6px 10px; font-size: 14px;
    cursor: pointer; font-family: inherit;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .floating-exit-fs:hover { background: rgba(0,0,0,0.7); }
  body.fullscreen .floating-exit-fs { display: inline-flex; align-items: center; gap: 4px; }

  /* Touch-friendly tap targets on coarse pointers (phones, tablets) */
  @media (pointer: coarse) {
    .btn { min-height: 40px; padding: 8px 12px; }
    .btn.icon { min-width: 40px; }
    .panel-tab { min-height: 44px; padding: 12px 10px; }
    .project-action { min-height: 36px; padding: 6px 10px; font-size: 12px; }
    .project-actions { opacity: 1 !important; }
    .field input, .field select, .field textarea { font-size: 16px; padding: 9px 10px; } /* 16px prevents iOS zoom-on-focus */
    .title-input { font-size: 16px !important; }
    .dropdown-item { padding: 10px 12px; min-height: 40px; }
    .linked-chip { font-size: 12px; padding: 5px 10px; }
    .modal { width: 96vw !important; max-width: 96vw !important; max-height: 90dvh; }
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: var(--modal-overlay);
    z-index: 100;
    display: none;
    align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 10px;
    width: 480px; max-width: 90vw;
    max-height: 80vh;
    display: flex; flex-direction: column;
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .modal-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .modal-header h2 {
    margin: 0; font-size: 15px; font-weight: 600; flex: 1; color: var(--text);
  }
  .modal-close {
    border: none; background: none; cursor: pointer;
    color: var(--text-faint); width: 28px; height: 28px;
    border-radius: 4px; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--hover-bg); color: var(--text); }
  .modal-body { flex: 1; overflow-y: auto; padding: 8px; }
  .modal-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
    background: var(--surface-2);
    flex-wrap: wrap;
  }
  .project-list { list-style: none; margin: 0; padding: 0; }
  .project-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
  }
  .project-item:hover { background: var(--hover-bg); }
  .project-item.current { background: var(--surface-3); }
  .project-info { flex: 1; min-width: 0; }
  .project-name {
    font-size: 13px; font-weight: 500; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .project-name .badge {
    color: var(--text-faint); font-weight: 400; font-size: 11px; margin-left: 4px;
  }

<script>
// =============================================================
// FlowSpec — visual flowchart builder with LLM-friendly text out
// =============================================================

const NODE_TYPES = {
  start:    { label: 'Start',    color: '#c0dd97', stroke: '#3b6d11', text: '#173404', shape: 'pill',    hint: 'Where the flow begins. Typically one per chart.' },
  process:  { label: 'Process',  color: '#fff',    stroke: '#888780', text: '#2c2c2a', shape: 'rect',    hint: 'A generic step or action — the default for most nodes.' },
  decision: { label: 'Decision', color: '#fac775', stroke: '#854f0b', text: '#412402', shape: 'diamond', hint: 'A branching point. Label outgoing edges with the condition (yes/no, if cached, etc).' },
  end:      { label: 'End',      color: '#f7c1c1', stroke: '#a32d2d', text: '#501313', shape: 'pill',    hint: 'Where the flow stops. Multiple ends are fine (success, error, etc).' },
  folder:   { label: 'Folder',   color: '#9fe1cb', stroke: '#0f6e56', text: '#04342c', shape: 'folder',  hint: 'A directory in a file structure. Connect to children to nest them. Picked up by the Folder tree output.' },
  data:     { label: 'File/Data',color: '#b5d4f4', stroke: '#185fa5', text: '#042c53', shape: 'rect',    hint: 'A file, document, or data object. Picked up by the Folder tree output when used as a child of a folder.' },
  screen:   { label: 'Screen',   color: '#cecbf6', stroke: '#534ab7', text: '#26215c', shape: 'rect',    hint: 'A UI screen, page, or view. Good for app navigation flows.' },
  note:     { label: 'Note',     color: '#faeeda', stroke: '#ba7517', text: '#412402', shape: 'note',    hint: 'Side commentary or annotation. Not really part of the flow itself.' },
};

const STORAGE_KEY = 'flowspec.state.v1'; // legacy — migration handled in loadWorkspace()
const SIZE_FACTOR = { S: 0.85, M: 1, L: 1.25 };

// ---------- State ----------
const state = {
  title: 'Untitled flow',
  nodes: [],
  edges: [],
  selectedNodeIds: new Set(),  // multi-select for nodes
  selectedEdgeId: null,        // edges are single-select only
  mode: 'select',     // 'select' | 'connect' | 'pan'
  connectSource: null,
  drag: null,         // { ids: [], startX, startY, origPositions: Map }
  pan: { x: 0, y: 0 },
  zoom: 1,
  isPanning: false,
  panStart: null,     // { mouseX, mouseY, panX, panY }
  spaceDown: false,
  zKeyDown: false,
  marquee: null,      // { x1, y1, x2, y2 } in world coords
  panTab: 'properties',
  format: 'markdown',
  nextId: 1,
  undoStack: [],
  redoStack: [],
  currentProjectId: null,
  panelCollapsed: false,
  searchHits: new Set(),  // node ids matching active search
  dirty: false,            // in-memory state differs from last saved file (or no file)
  loading: false,          // true while bulk-loading a project (suppresses dirty)
};

function genId(prefix) {
  return `${prefix}_${state.nextId++}`;
}

// ---------- Persistence ----------
const WORKSPACE_KEY = 'flowspec.workspace.v1';
const OLD_KEY = 'flowspec.state.v1';

function loadWorkspace() {
  try {
    const raw = localStorage.getItem(WORKSPACE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // Migration: convert old single-slot storage to a workspace
  try {
    const oldRaw = localStorage.getItem(OLD_KEY);
    if (oldRaw) {
      const oldData = JSON.parse(oldRaw);
      const id = 'proj_' + Date.now();
      return {
        currentId: id,
        projects: {
          [id]: {
            id,
            title: oldData.title || 'Imported',
            nodes: oldData.nodes || [],
            edges: oldData.edges || [],
            nextId: oldData.nextId || 1,
            createdAt: Date.now(),
            updatedAt: Date.now(),
          },
        },
      };
    }
  } catch(e) {}
  return { currentId: null, projects: {} };
}
function saveWorkspace(ws) {
  try { localStorage.setItem(WORKSPACE_KEY, JSON.stringify(ws)); }
  catch(e) { console.warn('saveWorkspace failed', e); }
}

function save() {
  const ws = loadWorkspace();
  if (!state.currentProjectId) state.currentProjectId = 'proj_' + Date.now();
  const prev = ws.projects[state.currentProjectId];
  ws.currentId = state.currentProjectId;
  ws.projects[state.currentProjectId] = {
    id: state.currentProjectId,
    title: state.title,
    nodes: state.nodes,
    edges: state.edges,
    nextId: state.nextId,
    createdAt: (prev && prev.createdAt) || Date.now(),
    updatedAt: Date.now(),
    hasLink: prev ? !!prev.hasLink : false,
    linkName: prev ? (prev.linkName || null) : null,
    dirty: state.dirty,
  };
  saveWorkspace(ws);
  // save() is called after every mutation — mark dirty unless we're currently mid-load
  if (state.loading !== true) {
    if (!state.dirty) markDirty();
    else renderLinkedState(); // already dirty, but title/etc may have changed
  }
}

function load() {
  const ws = loadWorkspace();
  if (!ws.currentId || !ws.projects[ws.currentId]) return false;
  const p = ws.projects[ws.currentId];
  state.currentProjectId = p.id;
  state.title = p.title || 'Untitled flow';
  state.nodes = p.nodes || [];
  state.edges = p.edges || [];
  state.nextId = p.nextId || 1;
  state.dirty = !!p.dirty;
  return true;
}

// ---------- Undo / Redo ----------
function serialize() {
  return {
    title: state.title,
    nodes: state.nodes.map(n => ({...n})),
    edges: state.edges.map(e => ({...e})),
    nextId: state.nextId,
  };
}
function deserialize(s) {
  state.title = s.title;
  state.nodes = s.nodes.map(n => ({...n}));
  state.edges = s.edges.map(e => ({...e}));
  state.nextId = s.nextId;
  // Drop selections that may reference removed items
  state.selectedNodeIds.clear();
  state.selectedEdgeId = null;
}
function snapshot() {
  const cur = serialize();
  const top = state.undoStack[state.undoStack.length - 1];
  // Dedupe: skip if identical to last snapshot
  if (top && JSON.stringify(top) === JSON.stringify(cur)) return;
  state.undoStack.push(cur);
  if (state.undoStack.length > 50) state.undoStack.shift();
  state.redoStack = [];
  updateUndoRedoButtons();
}
function undo() {
  if (state.undoStack.length === 0) return;
  state.redoStack.push(serialize());
  deserialize(state.undoStack.pop());
  const ti = document.getElementById('title-input');
  if (ti) ti.value = state.title;
  save();
  render();
  updateUndoRedoButtons();
}
function redo() {
  if (state.redoStack.length === 0) return;
  state.undoStack.push(serialize());
  deserialize(state.redoStack.pop());
  const ti = document.getElementById('title-input');
  if (ti) ti.value = state.title;
  save();
  render();
  updateUndoRedoButtons();
}
function updateUndoRedoButtons() {
  const u = document.getElementById('undo-btn');
  const r = document.getElementById('redo-btn');
  if (u) u.disabled = state.undoStack.length === 0;
  if (r) r.disabled = state.redoStack.length === 0;
}

// ---------- Geometry ----------
function nodeSize(node) {
  const t = NODE_TYPES[node.type];
  const lines = (node.label || '').split('\n');
  const longest = lines.reduce((m, l) => Math.max(m, l.length), 0);
  let width = Math.max(130, Math.min(260, longest * 8.5 + 32));
  let height = 52;
  if (node.description && node.description.trim()) {
    // Allow taller nodes when description is present (multi-line)
    const desc = node.description.trim();
    const descChars = desc.length;
    // Roughly: ~32 chars per line at width 200
    const approxLines = Math.min(2, Math.max(1, Math.ceil(descChars / 36)));
    height = 56 + approxLines * 14;
    // Widen a little if description is long-ish, to fit more on a line
    width = Math.max(width, Math.min(260, descChars * 4.5 + 40));
  }
  if (t.shape === 'diamond') {
    // Diamonds taper — give extra space, especially when there's a description
    const hasDesc = node.description && node.description.trim();
    width += hasDesc ? 70 : 30;
    height += hasDesc ? 32 : 10;
  }
  if (t.shape === 'pill') { width = Math.max(width, 120); }
  // Per-node size factor (S/M/L)
  const factor = SIZE_FACTOR[node.size] || 1;
  width = Math.round(width * factor);
  height = Math.round(height * factor);
  return { width, height };
}

function nodeBounds(node) {
  const s = nodeSize(node);
  return {
    x: node.x - s.width/2,
    y: node.y - s.height/2,
    w: s.width,
    h: s.height,
    cx: node.x,
    cy: node.y,
  };
}

// Edge endpoint: from source center, find intersection with target's rectangle boundary
function edgePoint(fromNode, toNode) {
  const a = nodeBounds(fromNode);
  const b = nodeBounds(toNode);
  const dx = b.cx - a.cx;
  const dy = b.cy - a.cy;
  if (dx === 0 && dy === 0) return { x: b.cx, y: b.cy };
  // For target: clip line segment from a center to b center against b's box
  const hw = b.w / 2 + 4;
  const hh = b.h / 2 + 4;
  const scaleX = dx !== 0 ? hw / Math.abs(dx) : Infinity;
  const scaleY = dy !== 0 ? hh / Math.abs(dy) : Infinity;
  const scale = Math.min(scaleX, scaleY);
  return { x: b.cx - dx * scale, y: b.cy - dy * scale };
}
function edgeStart(fromNode, toNode) {
  const a = nodeBounds(fromNode);
  const b = nodeBounds(toNode);
  const dx = b.cx - a.cx;
  const dy = b.cy - a.cy;
  if (dx === 0 && dy === 0) return { x: a.cx, y: a.cy };
  const hw = a.w / 2 + 2;
  const hh = a.h / 2 + 2;
  const scaleX = dx !== 0 ? hw / Math.abs(dx) : Infinity;
  const scaleY = dy !== 0 ? hh / Math.abs(dy) : Infinity;
  const scale = Math.min(scaleX, scaleY);
  return { x: a.cx + dx * scale, y: a.cy + dy * scale };
}

// ---------- DOM helpers ----------
const svg = document.getElementById('canvas');
const edgesLayer = document.getElementById('edges-layer');
const nodesLayer = document.getElementById('nodes-layer');
const overlayLayer = document.getElementById('overlay-layer');
const hintEl = document.getElementById('hint');
const statusEl = document.getElementById('status-text');

function el(tag, attrs = {}, ...children) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const k in attrs) {
    if (attrs[k] === false || attrs[k] == null) continue;
    e.setAttribute(k, attrs[k]);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

// ---------- Rendering ----------
function applyTransform() {
  const t = `translate(${state.pan.x},${state.pan.y}) scale(${state.zoom})`;
  edgesLayer.setAttribute('transform', t);
  nodesLayer.setAttribute('transform', t);
  overlayLayer.setAttribute('transform', t);
}

function render() {
  applyTransform();

  renderEdges();
  renderNodes();
  renderOverlay();
  renderPanel();

  const hasSel = state.selectedNodeIds.size > 0 || state.selectedEdgeId;
  document.getElementById('delete-btn').disabled = !hasSel;
  document.getElementById('connect-btn').classList.toggle('active', state.mode === 'connect');
  document.getElementById('pan-btn').classList.toggle('active', state.mode === 'pan');

  svg.classList.toggle('connecting', state.mode === 'connect');
  svg.classList.toggle('pan-ready', (state.mode === 'pan' || state.spaceDown) && !state.isPanning);
  svg.classList.toggle('panning', state.isPanning);
  svg.classList.toggle('zooming', state.zKeyDown);

  if (state.mode === 'connect') {
    hintEl.classList.add('show');
    hintEl.textContent = state.connectSource
      ? 'Now click the target node (Esc to cancel)'
      : 'Click the source node (Esc to cancel)';
  } else if (state.mode === 'pan') {
    hintEl.classList.add('show');
    hintEl.textContent = 'Pan mode — drag to move canvas (Esc to exit)';
  } else if (state.zKeyDown) {
    hintEl.classList.add('show');
    hintEl.textContent = 'Zoom mode — scroll to zoom in / out';
  } else {
    hintEl.classList.remove('show');
  }

  // Update zoom display
  const zd = document.getElementById('zoom-display');
  if (zd) zd.textContent = Math.round(state.zoom * 100) + '%';

  renderOutput();
}

function renderOverlay() {
  overlayLayer.innerHTML = '';
  if (state.marquee) {
    const m = state.marquee;
    const x = Math.min(m.x1, m.x2);
    const y = Math.min(m.y1, m.y2);
    const w = Math.abs(m.x2 - m.x1);
    const h = Math.abs(m.y2 - m.y1);
    overlayLayer.appendChild(el('rect', { class: 'marquee-rect', x, y, width: w, height: h }));
  }
}

function wrapDescription(desc, maxCharsPerLine, maxLines) {
  // Greedy word wrap with truncation
  const words = desc.split(/\s+/);
  const lines = [];
  let cur = '';
  for (const w of words) {
    if (lines.length >= maxLines) break;
    const next = cur ? cur + ' ' + w : w;
    if (next.length <= maxCharsPerLine) {
      cur = next;
    } else {
      if (cur) lines.push(cur);
      cur = w;
      if (lines.length >= maxLines) break;
    }
  }
  if (cur && lines.length < maxLines) lines.push(cur);
  // Truncate if text was longer than maxLines could hold
  let trimmedDesc = desc.replace(/\s+/g, ' ').trim();
  const joined = lines.join(' ');
  if (joined.length < trimmedDesc.length) {
    // Replace tail of last line with ellipsis
    let last = lines[lines.length - 1];
    if (last.length > maxCharsPerLine - 1) last = last.slice(0, maxCharsPerLine - 1);
    lines[lines.length - 1] = last.replace(/[.,;:\s]*$/, '') + '…';
  }
  return lines;
}

function renderNodes() {
  nodesLayer.innerHTML = '';
  for (const n of state.nodes) {
    const t = NODE_TYPES[n.type];
    const b = nodeBounds(n);
    const g = el('g', {
      class: 'node-group' + (state.selectedNodeIds.has(n.id) ? ' selected' : '')
        + (state.connectSource === n.id ? ' connect-source' : '')
        + (state.searchHits.has(n.id) ? ' search-hit' : ''),
      'data-id': n.id,
      transform: `translate(${b.cx},${b.cy})`,
    });

    let shape;
    if (t.shape === 'pill') {
      shape = el('rect', { class: 'node-shape', x: -b.w/2, y: -b.h/2, width: b.w, height: b.h, rx: b.h/2, ry: b.h/2, fill: t.color, stroke: t.stroke, 'stroke-width': 1.5 });
    } else if (t.shape === 'diamond') {
      shape = el('polygon', {
        class: 'node-shape',
        points: `0,${-b.h/2} ${b.w/2},0 0,${b.h/2} ${-b.w/2},0`,
        fill: t.color, stroke: t.stroke, 'stroke-width': 1.5,
      });
    } else if (t.shape === 'note') {
      const fold = 12;
      const w = b.w/2, h = b.h/2;
      shape = el('path', {
        class: 'node-shape',
        d: `M ${-w} ${-h} L ${w - fold} ${-h} L ${w} ${-h + fold} L ${w} ${h} L ${-w} ${h} Z`,
        fill: t.color, stroke: t.stroke, 'stroke-width': 1.5,
      });
    } else if (t.shape === 'folder') {
      const w = b.w/2, h = b.h/2;
      const tabW = Math.min(50, b.w * 0.4);
      const tabH = 8;
      const slope = 6;
      shape = el('path', {
        class: 'node-shape',
        d: `M ${-w} ${-h} L ${-w + tabW} ${-h} L ${-w + tabW + slope} ${-h + tabH} L ${w} ${-h + tabH} L ${w} ${h} L ${-w} ${h} Z`,
        fill: t.color, stroke: t.stroke, 'stroke-width': 1.5,
      });
    } else {
      shape = el('rect', { class: 'node-shape', x: -b.w/2, y: -b.h/2, width: b.w, height: b.h, rx: 6, ry: 6, fill: t.color, stroke: t.stroke, 'stroke-width': 1.5 });
    }
    g.appendChild(shape);

    const hasDesc = n.description && n.description.trim();
    const factor = SIZE_FACTOR[n.size] || 1;
    const labelFontSize = Math.round(13 * factor);
    const descFontSize = Math.round(12 * factor);
    let labelY = hasDesc ? -((descFontSize + 4) * 0.7) : 0;
    if (t.shape === 'folder') labelY += 4;
    const label = el('text', {
      class: 'node-text', x: 0, y: labelY,
      fill: t.text, 'font-size': labelFontSize,
    }, n.label || '(untitled)');
    g.appendChild(label);
    if (hasDesc) {
      // For diamonds, compute available width at the lowest description line
      // (where the diamond is narrowest at that vertical offset)
      let availableWidth;
      if (t.shape === 'diamond') {
        const lastLineY = (labelFontSize / 2 + 6) + 1 * (descFontSize + 2);
        // width of diamond at this y: w * (1 - 2|y|/h)
        const widthAtLine = b.w * (1 - 2 * lastLineY / b.h);
        availableWidth = Math.max(60, widthAtLine - 12);
      } else {
        availableWidth = b.w - 16;
      }
      const charsPerLine = Math.max(14, Math.floor(availableWidth / (descFontSize * 0.55)));
      const descLines = wrapDescription(n.description.trim(), charsPerLine, 2);
      // Slightly muted version of the node's text color for description
      const descColor = t.text;
      descLines.forEach((line, i) => {
        const y = (labelFontSize / 2 + 6) + i * (descFontSize + 2);
        const sub = el('text', {
          class: 'node-sub', x: 0, y,
          'font-size': descFontSize,
          fill: descColor, opacity: 0.78,
        }, line);
        g.appendChild(sub);
      });
    }

    nodesLayer.appendChild(g);
    attachNodeHandlers(g, n);
  }
}

function renderEdges() {
  edgesLayer.innerHTML = '';
  for (const e of state.edges) {
    const src = state.nodes.find(n => n.id === e.source);
    const tgt = state.nodes.find(n => n.id === e.target);
    if (!src || !tgt) continue;
    const p1 = edgeStart(src, tgt);
    const p2 = edgePoint(src, tgt);
    const isSel = state.selectedEdgeId === e.id;
    // Compute a slight curve
    const mx = (p1.x + p2.x) / 2;
    const my = (p1.y + p2.y) / 2;
    const path = `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`;
    const hit = el('path', { class: 'edge-hit', d: path, 'data-id': e.id });
    const line = el('path', {
      class: 'edge-line' + (isSel ? ' selected' : ''),
      d: path,
      'marker-end': isSel ? 'url(#arrow-sel)' : 'url(#arrow)',
    });
    hit.addEventListener('pointerdown', (ev) => {
      pointers.set(ev.pointerId, { x: ev.clientX, y: ev.clientY });
      if (pointers.size >= 2) {
        cancelOngoingOperations();
        startPinch();
        return;
      }
      if (state.mode === 'pan' || state.spaceDown || ev.button === 1 || isTouchPointer(ev) && state.mode !== 'connect') {
        // Touch on edge falls through to selectEdge (tap to select). Only start pan for actual pan modes.
        if (state.mode === 'pan' || state.spaceDown || ev.button === 1) {
          startPan(ev);
          return;
        }
      }
      ev.stopPropagation();
      selectEdge(e.id);
    });
    edgesLayer.appendChild(line);
    edgesLayer.appendChild(hit);

    if (e.label && e.label.trim()) {
      const text = el('text', { class: 'edge-label', x: mx, y: my - 4 }, e.label);
      // Background pill — measure approx
      const textWidth = Math.max(20, e.label.length * 6 + 10);
      const bg = el('rect', {
        class: 'edge-label-bg',
        x: mx - textWidth/2, y: my - 13,
        width: textWidth, height: 18, rx: 4, ry: 4,
      });
      edgesLayer.appendChild(bg);
      edgesLayer.appendChild(text);
    }
  }
}

// ---------- Mouse / drag ----------
// Viewport coords (relative to SVG element)
function svgPoint(evt) {
  const rect = svg.getBoundingClientRect();
  return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
}
// World coords (pan + zoom adjusted) — what we use for node positions, marquee, etc.
function worldPoint(evt) {
  const p = svgPoint(evt);
  return { x: (p.x - state.pan.x) / state.zoom, y: (p.y - state.pan.y) / state.zoom };
}
function screenToWorld(p) {
  return { x: (p.x - state.pan.x) / state.zoom, y: (p.y - state.pan.y) / state.zoom };
}

function attachNodeHandlers(g, node) {
  g.addEventListener('pointerdown', (ev) => {
    pointers.set(ev.pointerId, { x: ev.clientX, y: ev.clientY });
    if (pointers.size >= 2) {
      cancelOngoingOperations();
      startPinch();
      ev.stopPropagation();
      return;
    }
    ev.stopPropagation();

    // Pan takes priority over node interaction
    if (state.mode === 'pan' || state.spaceDown || ev.button === 1) {
      startPan(ev);
      return;
    }

    if (state.mode === 'connect') {
      if (!state.connectSource) {
        state.connectSource = node.id;
        render();
      } else if (state.connectSource === node.id) {
        state.connectSource = null;
        render();
      } else {
        snapshot();
        const newEdge = {
          id: genId('edge'),
          source: state.connectSource,
          target: node.id,
          label: '',
        };
        state.edges.push(newEdge);
        state.connectSource = null;
        state.mode = 'select';
        state.selectedNodeIds.clear();
        state.selectedEdgeId = newEdge.id;
        save();
        render();
      }
      return;
    }

    // Shift-click: toggle membership in selection
    if (ev.shiftKey) {
      if (state.selectedNodeIds.has(node.id)) {
        state.selectedNodeIds.delete(node.id);
      } else {
        state.selectedNodeIds.add(node.id);
      }
      state.selectedEdgeId = null;
      render();
      return;
    }

    // If clicking a node NOT in the current selection, replace selection
    if (!state.selectedNodeIds.has(node.id)) {
      state.selectedNodeIds.clear();
      state.selectedNodeIds.add(node.id);
      state.selectedEdgeId = null;
    }

    // Begin group drag — record original positions of every selected node
    const wp = worldPoint(ev);
    const origPositions = new Map();
    for (const id of state.selectedNodeIds) {
      const nn = state.nodes.find(x => x.id === id);
      if (nn) origPositions.set(id, { x: nn.x, y: nn.y });
    }
    state.drag = {
      ids: Array.from(state.selectedNodeIds),
      startX: wp.x,
      startY: wp.y,
      origPositions,
      moved: false,
    };
    render();
  });
}

function startPan(ev) {
  state.isPanning = true;
  const p = svgPoint(ev);
  state.panStart = {
    mouseX: p.x,
    mouseY: p.y,
    panX: state.pan.x,
    panY: state.pan.y,
  };
  render();
}

svg.addEventListener('pointerdown', (ev) => {
  pointers.set(ev.pointerId, { x: ev.clientX, y: ev.clientY });
  if (pointers.size >= 2) {
    cancelOngoingOperations();
    startPinch();
    return;
  }

  // Pan mode (toggle, spacebar, middle click) on empty canvas → pan
  if (state.mode === 'pan' || state.spaceDown || ev.button === 1) {
    startPan(ev);
    return;
  }

  if (state.mode === 'connect') {
    state.connectSource = null;
    state.mode = 'select';
    render();
    return;
  }

  // Touch on empty canvas: pan (not marquee — too easy to trigger by accident)
  if (isTouchPointer(ev)) {
    startPan(ev);
    return;
  }

  // Mouse on empty canvas: marquee select
  const wp = worldPoint(ev);
  if (!ev.shiftKey) {
    state.selectedNodeIds.clear();
    state.selectedEdgeId = null;
  }
  state.marquee = { x1: wp.x, y1: wp.y, x2: wp.x, y2: wp.y, additive: ev.shiftKey, baseSelection: new Set(state.selectedNodeIds) };
  render();
});

document.addEventListener('pointermove', (ev) => {
  // Update pointer position if tracked
  if (pointers.has(ev.pointerId)) {
    pointers.set(ev.pointerId, { x: ev.clientX, y: ev.clientY });
  }
  // Pinch in progress — handle first, ignore other operations
  if (pinch && pointers.size >= 2) {
    updatePinch();
    return;
  }
  // Pan in progress
  if (state.isPanning) {
    const p = svgPoint(ev);
    state.pan.x = state.panStart.panX + (p.x - state.panStart.mouseX);
    state.pan.y = state.panStart.panY + (p.y - state.panStart.mouseY);
    applyTransform();
    return;
  }

  // Group drag in progress
  if (state.drag) {
    const wp = worldPoint(ev);
    const dx = wp.x - state.drag.startX;
    const dy = wp.y - state.drag.startY;
    if (!state.drag.moved && (Math.abs(dx) > 2 || Math.abs(dy) > 2)) {
      state.drag.moved = true;
      snapshot(); // snap at start of actual move, not on every click
    }
    for (const id of state.drag.ids) {
      const n = state.nodes.find(x => x.id === id);
      const orig = state.drag.origPositions.get(id);
      if (!n || !orig) continue;
      n.x = Math.round((orig.x + dx) / 10) * 10;
      n.y = Math.round((orig.y + dy) / 10) * 10;
      const g = nodesLayer.querySelector(`g[data-id="${id}"]`);
      if (g) g.setAttribute('transform', `translate(${n.x},${n.y})`);
    }
    renderEdges();
    return;
  }

  // Marquee in progress
  if (state.marquee) {
    const wp = worldPoint(ev);
    state.marquee.x2 = wp.x;
    state.marquee.y2 = wp.y;

    // Recompute selection live
    const m = state.marquee;
    const minX = Math.min(m.x1, m.x2), maxX = Math.max(m.x1, m.x2);
    const minY = Math.min(m.y1, m.y2), maxY = Math.max(m.y1, m.y2);
    const hits = new Set(m.additive ? m.baseSelection : []);
    for (const n of state.nodes) {
      const b = nodeBounds(n);
      // Node is in marquee if its center is inside (cheaper, feels right)
      if (b.cx >= minX && b.cx <= maxX && b.cy >= minY && b.cy <= maxY) {
        hits.add(n.id);
      }
    }
    state.selectedNodeIds = hits;
    renderOverlay();
    renderNodes();
    return;
  }
});

function onPointerEnd(ev) {
  // Remove the pointer that ended
  pointers.delete(ev.pointerId);
  // If pinch was active and we now have <2 pointers, end it
  if (pinch && pointers.size < 2) {
    endPinch();
    // If one pointer remains after pinch, don't auto-start a drag —
    // wait for fresh interaction. Cancel any incidental state.
    if (pointers.size === 0) cancelOngoingOperations();
    render();
    return;
  }
  // Single-pointer end → finalize whatever was happening
  if (state.isPanning && pointers.size === 0) {
    state.isPanning = false;
    state.panStart = null;
    render();
    return;
  }
  if (state.drag && pointers.size === 0) {
    const moved = state.drag.moved;
    state.drag = null;
    if (moved) save();
    render();
    return;
  }
  if (state.marquee && pointers.size === 0) {
    state.marquee = null;
    render();
    return;
  }
}
document.addEventListener('pointerup', onPointerEnd);
document.addEventListener('pointercancel', onPointerEnd);

document.addEventListener('keydown', (ev) => {
  // Cmd/Ctrl+F always opens search, even when focused in a field
  if (ev.key === 'f' && (ev.metaKey || ev.ctrlKey) && !ev.shiftKey) {
    if (typeof openSearch === 'function') openSearch();
    ev.preventDefault();
    return;
  }
  if (ev.target.matches('input, textarea, select')) return;
  // Modal close on Esc takes priority
  const modal = document.getElementById('projects-modal');
  if (modal && modal.classList.contains('open') && ev.key === 'Escape') {
    closeProjectsModal();
    ev.preventDefault();
    return;
  }
  if (ev.key === ' ' || ev.code === 'Space') {
    if (!state.spaceDown) {
      state.spaceDown = true;
      render();
    }
    ev.preventDefault();
    return;
  }
  // Z key: zoom mode (hold + scroll)
  if ((ev.key === 'z' || ev.key === 'Z') && !ev.metaKey && !ev.ctrlKey && !ev.shiftKey) {
    if (!state.zKeyDown) {
      state.zKeyDown = true;
      render();
    }
    ev.preventDefault();
    return;
  }
  if (ev.key === 'Delete' || ev.key === 'Backspace') {
    if (state.selectedNodeIds.size > 0 || state.selectedEdgeId) deleteSelected();
  } else if (ev.key === 'Escape') {
    if (state.searchHits.size > 0 && typeof closeSearch === 'function') {
      closeSearch();
    } else if (state.mode !== 'select') {
      state.mode = 'select';
      state.connectSource = null;
      render();
    } else if (state.selectedNodeIds.size > 0 || state.selectedEdgeId) {
      clearSelection();
      render();
    }
  } else if ((ev.key === 'c' || ev.key === 'C') && !ev.metaKey && !ev.ctrlKey) {
    toggleConnect();
  } else if ((ev.key === 'f' || ev.key === 'F') && !ev.metaKey && !ev.ctrlKey) {
    fitToContent();
  } else if (ev.key === 'a' && (ev.metaKey || ev.ctrlKey)) {
    state.selectedNodeIds = new Set(state.nodes.map(n => n.id));
    state.selectedEdgeId = null;
    render();
    ev.preventDefault();
  } else if (ev.key === 'd' && (ev.metaKey || ev.ctrlKey)) {
    duplicateSelected();
    ev.preventDefault();
  } else if (ev.key === 'z' && (ev.metaKey || ev.ctrlKey) && !ev.shiftKey) {
    undo();
    ev.preventDefault();
  } else if (((ev.key === 'z' && ev.shiftKey) || ev.key === 'y') && (ev.metaKey || ev.ctrlKey)) {
    redo();
    ev.preventDefault();
  } else if (ev.key === 'ArrowUp' || ev.key === 'ArrowDown' || ev.key === 'ArrowLeft' || ev.key === 'ArrowRight') {
    if (state.selectedNodeIds.size === 0) return;
    const step = ev.shiftKey ? 50 : 10;
    let dx = 0, dy = 0;
    if (ev.key === 'ArrowUp') dy = -step;
    if (ev.key === 'ArrowDown') dy = step;
    if (ev.key === 'ArrowLeft') dx = -step;
    if (ev.key === 'ArrowRight') dx = step;
    snapshot();
    for (const id of state.selectedNodeIds) {
      const n = state.nodes.find(x => x.id === id);
      if (n) { n.x += dx; n.y += dy; }
    }
    save();
    render();
    ev.preventDefault();
  }
});

document.addEventListener('keyup', (ev) => {
  if (ev.key === ' ' || ev.code === 'Space') {
    state.spaceDown = false;
    render();
  }
  if (ev.key === 'z' || ev.key === 'Z') {
    if (state.zKeyDown && !ev.metaKey && !ev.ctrlKey) {
      state.zKeyDown = false;
      render();
    }
  }
});

// ---------- Selection ----------
function selectNode(id) {
  state.selectedNodeIds.clear();
  state.selectedNodeIds.add(id);
  state.selectedEdgeId = null;
  state.panTab = 'properties';
  render();
}
function selectEdge(id) {
  state.selectedNodeIds.clear();
  state.selectedEdgeId = id;
  state.panTab = 'properties';
  render();
}
function clearSelection() {
  state.selectedNodeIds.clear();
  state.selectedEdgeId = null;
}
function deleteSelected() {
  if (state.selectedNodeIds.size === 0 && !state.selectedEdgeId) return;
  snapshot();
  if (state.selectedNodeIds.size > 0) {
    const ids = state.selectedNodeIds;
    state.nodes = state.nodes.filter(n => !ids.has(n.id));
    state.edges = state.edges.filter(e => !ids.has(e.source) && !ids.has(e.target));
  }
  if (state.selectedEdgeId) {
    state.edges = state.edges.filter(e => e.id !== state.selectedEdgeId);
  }
  clearSelection();
  save();
  render();
}

// ---------- Add node ----------
function addNode(type) {
  snapshot();
  const rect = svg.getBoundingClientRect();
  // Place in visible center (world coords accounting for pan + zoom)
  const center = screenToWorld({ x: rect.width / 2, y: rect.height / 2 });
  let x = center.x, y = center.y;
  const taken = new Set(state.nodes.map(n => `${Math.round(n.x/10)},${Math.round(n.y/10)}`));
  let tries = 0;
  while (taken.has(`${Math.round(x/10)},${Math.round(y/10)}`) && tries < 30) {
    x += 30; y += 25;
    tries++;
  }
  const node = {
    id: genId('node'),
    type,
    label: NODE_TYPES[type].label,
    description: '',
    size: 'M',
    x: Math.round(x/10)*10,
    y: Math.round(y/10)*10,
  };
  state.nodes.push(node);
  state.selectedNodeIds.clear();
  state.selectedNodeIds.add(node.id);
  state.selectedEdgeId = null;
  state.panTab = 'properties';
  save();
  render();
}

// ---------- Duplicate selection ----------
function duplicateSelected() {
  if (state.selectedNodeIds.size === 0) return;
  snapshot();
  const oldToNew = new Map();
  const newIds = new Set();
  for (const id of state.selectedNodeIds) {
    const orig = state.nodes.find(n => n.id === id);
    if (!orig) continue;
    const copy = { ...orig, id: genId('node'), x: orig.x + 30, y: orig.y + 30 };
    state.nodes.push(copy);
    oldToNew.set(orig.id, copy.id);
    newIds.add(copy.id);
  }
  // Also duplicate edges that are entirely within the selected set
  const internal = state.edges.filter(e => oldToNew.has(e.source) && oldToNew.has(e.target));
  for (const e of internal) {
    state.edges.push({
      id: genId('edge'),
      source: oldToNew.get(e.source),
      target: oldToNew.get(e.target),
      label: e.label || '',
    });
  }
  state.selectedNodeIds = newIds;
  state.selectedEdgeId = null;
  save();
  render();
}

function toggleConnect() {
  if (state.mode === 'connect') {
    state.mode = 'select';
    state.connectSource = null;
  } else {
    state.mode = 'connect';
    state.connectSource = null;
    clearSelection();
  }
  render();
}

function togglePan() {
  if (state.mode === 'pan') {
    state.mode = 'select';
  } else {
    state.mode = 'pan';
    state.connectSource = null;
    clearSelection();
  }
  render();
}

function resetView() {
  state.pan.x = 0;
  state.pan.y = 0;
  state.zoom = 1;
  render();
}

// ---------- Pointer tracking (mouse + touch + pen) ----------
const pointers = new Map(); // pointerId -> {x, y}

function isTouchPointer(ev) {
  return ev.pointerType === 'touch' || ev.pointerType === 'pen';
}
function midpoint(a, b) {
  return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
}
function distance(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.hypot(dx, dy);
}
function cancelOngoingOperations() {
  if (state.drag) state.drag = null;
  if (state.marquee) state.marquee = null;
  if (state.isPanning) { state.isPanning = false; state.panStart = null; }
}
let pinch = null; // { startDist, startZoom, startMidWorld }

function startPinch() {
  if (pointers.size < 2) return;
  const [a, b] = Array.from(pointers.values()).slice(0, 2);
  const midScreenRel = svgPointFromClient(midpoint(a, b));
  pinch = {
    startDist: distance(a, b),
    startZoom: state.zoom,
    startMidWorld: screenToWorld(midScreenRel),
  };
}
function updatePinch() {
  if (!pinch || pointers.size < 2) return;
  const [a, b] = Array.from(pointers.values()).slice(0, 2);
  const newDist = distance(a, b);
  if (pinch.startDist < 1) return;
  let newZoom = pinch.startZoom * (newDist / pinch.startDist);
  newZoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, newZoom));
  const newMidScreen = svgPointFromClient(midpoint(a, b));
  state.zoom = newZoom;
  state.pan.x = newMidScreen.x - pinch.startMidWorld.x * newZoom;
  state.pan.y = newMidScreen.y - pinch.startMidWorld.y * newZoom;
  applyTransform();
  const zd = document.getElementById('zoom-display');
  if (zd) zd.textContent = Math.round(state.zoom * 100) + '%';
}
function endPinch() { pinch = null; }

function svgPointFromClient(clientPt) {
  const rect = svg.getBoundingClientRect();
  return { x: clientPt.x - rect.left, y: clientPt.y - rect.top };
}

// ---------- Zoom ----------
const ZOOM_MIN = 0.2;
const ZOOM_MAX = 3;

function setZoom(newZoom, anchorScreen) {
  const clamped = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, newZoom));
  if (clamped === state.zoom) return;
  // Anchor: keep the world point under anchorScreen stationary in screen space
  if (anchorScreen) {
    const wp = screenToWorld(anchorScreen);
    state.zoom = clamped;
    state.pan.x = anchorScreen.x - wp.x * state.zoom;
    state.pan.y = anchorScreen.y - wp.y * state.zoom;
  } else {
    // Anchor on viewport center
    const rect = svg.getBoundingClientRect();
    const center = { x: rect.width / 2, y: rect.height / 2 };
    const wp = screenToWorld(center);
    state.zoom = clamped;
    state.pan.x = center.x - wp.x * state.zoom;
    state.pan.y = center.y - wp.y * state.zoom;
  }
  render();
}

function zoomBy(factor, anchorScreen) {
  setZoom(state.zoom * factor, anchorScreen);
}

function fitToContent(padding = 60) {
  if (state.nodes.length === 0) {
    resetView();
    return;
  }
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const n of state.nodes) {
    const b = nodeBounds(n);
    if (b.x < minX) minX = b.x;
    if (b.y < minY) minY = b.y;
    if (b.x + b.w > maxX) maxX = b.x + b.w;
    if (b.y + b.h > maxY) maxY = b.y + b.h;
  }
  const contentW = maxX - minX;
  const contentH = maxY - minY;
  const rect = svg.getBoundingClientRect();
  const availW = rect.width - padding * 2;
  const availH = rect.height - padding * 2;
  const zoomFit = Math.min(availW / contentW, availH / contentH, ZOOM_MAX);
  state.zoom = Math.max(ZOOM_MIN, zoomFit);
  // Center content
  const contentCenterX = (minX + maxX) / 2;
  const contentCenterY = (minY + maxY) / 2;
  state.pan.x = rect.width / 2 - contentCenterX * state.zoom;
  state.pan.y = rect.height / 2 - contentCenterY * state.zoom;
  render();
}

// Wheel handler — zoom when Z held or Ctrl held (also catches pinch on trackpads).
// Otherwise let the browser do normal scroll behavior over the canvas.
document.getElementById('canvas-wrap').addEventListener('wheel', (ev) => {
  const triggerZoom = state.zKeyDown || ev.ctrlKey || ev.metaKey;
  if (!triggerZoom) return;
  ev.preventDefault();
  // Normalize delta — pinch and ctrl+wheel use small values, regular wheel uses ~100px lines
  let delta = ev.deltaY;
  if (ev.deltaMode === 1) delta *= 16;       // line mode
  if (ev.deltaMode === 2) delta *= 400;      // page mode
  // Pinch-zoom on trackpads: ctrlKey true with small delta — gentler factor
  const intensity = Math.min(0.25, Math.abs(delta) * 0.0015);
  const factor = delta < 0 ? 1 + intensity : 1 - intensity;
  const anchor = svgPoint(ev);
  zoomBy(factor, anchor);
}, { passive: false });

    document.getElementById('align-right').onclick = () => { snapshot(); const ns = sel(); const max = Math.max(...ns.map(n => nodeBounds(n).x + nodeBounds(n).w)); ns.forEach(n => { n.x = max - nodeBounds(n).w/2; }); save(); render(); };
    document.getElementById('align-h-center').onclick = () => { snapshot(); const ns = sel(); const avg = ns.reduce((s, n) => s + n.x, 0) / ns.length; ns.forEach(n => { n.x = Math.round(avg/10)*10; }); save(); render(); };

    document.getElementById('f-desc').addEventListener('input', (e) => { n.description = e.target.value; save(); renderNodes(); renderEdges(); renderOutput(); });

  if (hasEdge) {
    const e = state.edges.find(x => x.id === state.selectedEdgeId);

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

// ---------- Output generation ----------
const FORMAT_DESC = {
  markdown: '<strong>Structured Markdown</strong> — best for pasting into an LLM as a spec. Clean hierarchy, all nodes and connections enumerated, plus an ASCII tree of the flow.',
  narrative: '<strong>Narrative</strong> — best when the LLM needs the <em>story</em>, not just the structure. Each node described in prose with what it leads to. Good for nuanced flows where intent isn\'t obvious from boxes alone.',
  tree: '<strong>Folder tree (ASCII)</strong> — best for file/folder structures. Builds a <code>tree</code>-style ASCII layout from your folder and file nodes. Connect parent folders to their children; non-folder/file nodes are skipped.',
  json: '<strong>JSON</strong> — best for programmatic use. Feed into scripts, version-control your spec, or ask an LLM to generate code that constructs the same graph. Machine-readable, lossless.',
  mermaid: '<strong>Mermaid</strong> — best when you want the diagram <em>rendered elsewhere</em>. Paste into a GitHub README, Notion page, or any Mermaid renderer to display the chart visually.',
};

function renderOutput() {
  const out = document.getElementById('output-text');
  const desc = document.getElementById('format-desc');
  if (!out || !desc) return; // Spec tab not currently mounted
  desc.innerHTML = FORMAT_DESC[state.format] || '';
  let txt = '';
  switch (state.format) {
    case 'markdown':  txt = formatMarkdown(); break;
    case 'narrative': txt = formatNarrative(); break;
    case 'tree':      txt = formatFolderTree(); break;
    case 'json':      txt = formatJson(); break;
    case 'mermaid':   txt = formatMermaid(); break;
  }
  out.textContent = txt;
}

function formatMarkdown() {
  const lines = [];
  lines.push(`# ${state.title || 'Untitled flow'}`);
  lines.push('');
  lines.push(`_${state.nodes.length} nodes, ${state.edges.length} connections_`);
  lines.push('');

  // Group nodes by type for readability
  const byType = {};
  for (const n of state.nodes) {
    (byType[n.type] = byType[n.type] || []).push(n);
  }

  lines.push('## Nodes');
  lines.push('');
  for (const n of state.nodes) {
    const t = NODE_TYPES[n.type].label;
    lines.push(`- **${n.label || '(untitled)'}** _[${t.toLowerCase()}]_${n.description ? ' — ' + n.description.replace(/\s+/g, ' ').trim() : ''}`);
  }
  lines.push('');

  lines.push('## Connections');
  lines.push('');
  if (state.edges.length === 0) {
    lines.push('_(no connections yet)_');
  } else {
    // Sort by source then target for stable output
    const sorted = [...state.edges].sort((a, b) => {
      const an = nodeOrder(a.source); const bn = nodeOrder(b.source);
      if (an !== bn) return an - bn;
      return nodeOrder(a.target) - nodeOrder(b.target);
    });
    for (const e of sorted) {
      const s = state.nodes.find(n => n.id === e.source);
      const t = state.nodes.find(n => n.id === e.target);
      if (!s || !t) continue;
      const label = e.label ? ` _(${e.label})_` : '';
      lines.push(`- ${s.label} → ${t.label}${label}`);
    }
  }
  lines.push('');

  // Flow summary: find roots (no incoming edges) and traverse
  const summary = computeFlowSummary();
  if (summary) {
    lines.push('## Flow summary');
    lines.push('');
    lines.push(summary);
  }

  return lines.join('\n');
}

function nodeOrder(id) {
  return state.nodes.findIndex(n => n.id === id);
}

function formatNarrative() {
  if (state.nodes.length === 0) return '(empty flow)';
  const summary = computeFlowSummary();
  const parts = [];
  parts.push(`Flow: ${state.title || 'Untitled flow'}`);
  parts.push('');
  parts.push(`This flow has ${state.nodes.length} step${state.nodes.length === 1 ? '' : 's'} and ${state.edges.length} connection${state.edges.length === 1 ? '' : 's'}.`);
  parts.push('');
  if (summary) {
    parts.push(summary);
    parts.push('');
  }
  // Per-node details
  for (const n of state.nodes) {
    const t = NODE_TYPES[n.type].label.toLowerCase();
    const outs = state.edges.filter(e => e.source === n.id).map(e => {
      const tgt = state.nodes.find(x => x.id === e.target);
      const label = e.label ? ` (${e.label})` : '';
      return tgt ? `${tgt.label}${label}` : null;
    }).filter(Boolean);
    let line = `• "${n.label}" [${t}]`;
    if (n.description) line += `: ${n.description.replace(/\s+/g, ' ').trim()}`;
    if (outs.length) line += `. Leads to: ${outs.join(', ')}.`;
    else line += '. Terminal — no outgoing connections.';
    parts.push(line);
  }
  return parts.join('\n');
}

function formatJson() {
  return JSON.stringify({
    title: state.title,
    nodes: state.nodes.map(n => ({
      id: n.id,
      type: n.type,
      label: n.label,
      description: n.description || undefined,
    })),
    edges: state.edges.map(e => ({
      source: e.source,
      target: e.target,
      label: e.label || undefined,
    })),
  }, null, 2);
}

function formatFolderTree() {
  // Only consider folder + file/data nodes
  const TREE_TYPES = new Set(['folder', 'data']);
  const treeNodes = state.nodes.filter(n => TREE_TYPES.has(n.type));
  if (treeNodes.length === 0) {
    return '(No folder or file nodes yet. Add some "Folder" or "File/Data" nodes and connect parents to children, then come back.)';
  }
  // Build adjacency: source -> [targets]
  const childrenOf = {};
  for (const n of treeNodes) childrenOf[n.id] = [];
  for (const e of state.edges) {
    const s = state.nodes.find(n => n.id === e.source);
    const t = state.nodes.find(n => n.id === e.target);
    if (!s || !t) continue;
    if (!TREE_TYPES.has(s.type) || !TREE_TYPES.has(t.type)) continue;
    childrenOf[s.id].push(t.id);
  }
  // Roots: tree nodes with no incoming tree edge
  const incoming = {};
  for (const n of treeNodes) incoming[n.id] = 0;
  for (const e of state.edges) {
    if (incoming[e.target] != null) {
      const s = state.nodes.find(n => n.id === e.source);
      if (s && TREE_TYPES.has(s.type)) incoming[e.target]++;
    }
  }
  const roots = treeNodes.filter(n => incoming[n.id] === 0);
  if (roots.length === 0) {
    return '(Folder nodes are connected in a cycle — no clear root. Disconnect a loop and try again.)';
  }
  // Sort children: folders first, then by canvas y position (top-to-bottom), then x
  const sortChildren = (ids) => {
    return ids.slice().sort((a, b) => {
      const na = state.nodes.find(n => n.id === a);
      const nb = state.nodes.find(n => n.id === b);
      if (na.type !== nb.type) return na.type === 'folder' ? -1 : 1;
      if (Math.abs(na.y - nb.y) > 30) return na.y - nb.y;
      return na.x - nb.x;
    });
  };
  // Render
  const lines = [];
  const visited = new Set();
  const walk = (id, prefix, isLast, isRoot) => {
    if (visited.has(id)) {
      lines.push(`${prefix}${isLast ? '└── ' : '├── '}↻ (cycle: already shown)`);
      return;
    }
    visited.add(id);
    const n = state.nodes.find(x => x.id === id);
    const name = (n.label || '(unnamed)') + (n.type === 'folder' ? '/' : '');
    const desc = n.description && n.description.trim() ? `  # ${n.description.replace(/\s+/g, ' ').trim()}` : '';
    if (isRoot) {
      lines.push(name + desc);
    } else {
      lines.push(`${prefix}${isLast ? '└── ' : '├── '}${name}${desc}`);
    }
    const kids = sortChildren(childrenOf[id] || []);
    const childPrefix = isRoot ? '' : prefix + (isLast ? '    ' : '│   ');
    kids.forEach((cid, i) => {
      walk(cid, childPrefix, i === kids.length - 1, false);
    });
  };
  const sortedRoots = sortChildren(roots.map(r => r.id));
  sortedRoots.forEach((rid, i) => {
    if (i > 0) lines.push('');
    walk(rid, '', true, true);
  });
  return lines.join('\n');
}

function formatMermaid() {
  if (state.nodes.length === 0) return 'flowchart TD\n  empty[No nodes yet]';
  const lines = ['flowchart TD'];
  // Node declarations with shape based on type
  for (const n of state.nodes) {
    const safe = (n.label || 'node').replace(/"/g, "'");
    let line;
    switch (n.type) {
      case 'start':
      case 'end':
        line = `  ${n.id}(["${safe}"])`; break;
      case 'decision':
        line = `  ${n.id}{"${safe}"}`; break;
      case 'data':
        line = `  ${n.id}[("${safe}")]`; break;
      case 'note':
        line = `  ${n.id}>"${safe}"]`; break;
      default:
        line = `  ${n.id}["${safe}"]`;
    }
    lines.push(line);
  }
  for (const e of state.edges) {
    const label = e.label ? `|"${e.label.replace(/"/g, "'")}"|` : '';
    lines.push(`  ${e.source} -->${label} ${e.target}`);
  }
  return lines.join('\n');
}

// Find entry nodes (no incoming) and try to describe the flow narratively
function computeFlowSummary() {
  if (state.nodes.length === 0) return null;
  const incoming = {};
  for (const n of state.nodes) incoming[n.id] = 0;
  for (const e of state.edges) {
    if (incoming[e.target] != null) incoming[e.target]++;
  }
  const roots = state.nodes.filter(n => incoming[n.id] === 0);
  if (roots.length === 0) return 'The flow is cyclic — no clear entry point.';

  // BFS from each root, list paths up to a depth
  const lines = [];
  for (const r of roots) {
    const visited = new Set();
    const stack = [{ node: r, depth: 0, prefix: '' }];
    while (stack.length) {
      const { node, depth, prefix } = stack.shift();
      if (visited.has(node.id) || depth > 12) {
        if (visited.has(node.id)) lines.push(`${prefix}↻ ${node.label} (already visited)`);
        continue;
      }
      visited.add(node.id);
      const t = NODE_TYPES[node.type].label.toLowerCase();
      lines.push(`${prefix}${depth === 0 ? '▸ ' : '└─ '}${node.label} [${t}]`);
      const outs = state.edges.filter(e => e.source === node.id);
      for (const o of outs) {
        const tgt = state.nodes.find(n => n.id === o.target);
        if (!tgt) continue;
        const label = o.label ? ` [${o.label}]` : '';
        stack.unshift({ node: tgt, depth: depth + 1, prefix: prefix + '   ' + (outs.length > 1 ? '' : '') });
        // We'll just inline the label by modifying prefix... simpler:
      }
    }
  }

  // Alternative simpler representation: list each root and its outgoing chain
  const out = [];
  out.push('```');
  for (const r of roots) {
    out.push(...traverseAscii(r, new Set(), 0, ''));
  }
  out.push('```');
  return out.join('\n');
}

function traverseAscii(node, visited, depth, prefix) {
  const lines = [];
  if (visited.has(node.id)) {
    lines.push(`${prefix}↻ ${node.label} (loop)`);
    return lines;
  }
  visited.add(node.id);
  const t = NODE_TYPES[node.type].label.toLowerCase();
  lines.push(`${prefix}${node.label} [${t}]`);
  const outs = state.edges.filter(e => e.source === node.id);
  outs.forEach((o, i) => {
    const tgt = state.nodes.find(n => n.id === o.target);
    if (!tgt) return;
    const isLast = i === outs.length - 1;
    const branch = isLast ? '└─' : '├─';
    const childPrefix = prefix + (isLast ? '   ' : '│  ');
    const label = o.label ? ` (${o.label})` : '';
    lines.push(`${prefix}${branch}${label} ↓`);
    lines.push(...traverseAscii(tgt, new Set(visited), depth + 1, childPrefix));
  });
  return lines;
}

function openSearch() {

  state.searchHits = new Set();

function closeSearch() {
  document.getElementById('search-box').classList.remove('open');
  document.getElementById('search-results').style.display = 'none';
  state.searchHits = new Set();
  render();
}
function renderSearchResults(query) {
  const results = document.getElementById('search-results');
  const q = query.trim().toLowerCase();
  if (!q) {
    state.searchHits = new Set();
    results.style.display = 'none';
    renderNodes();
    return;
  }
  const hits = state.nodes.filter(n =>
    (n.label || '').toLowerCase().includes(q) ||
    (n.description || '').toLowerCase().includes(q)
  );
  state.searchHits = new Set(hits.map(n => n.id));
  if (hits.length === 0) {
    results.innerHTML = `<div style="padding:10px; color:var(--text-faint); font-size:12px;">No matches</div>`;
    results.style.display = 'block';
  } else {
    results.innerHTML = hits.slice(0, 12).map(n => `
      <div class="search-result" data-id="${n.id}">
        ${escapeHtml(n.label || '(untitled)')}
        <span class="type">[${NODE_TYPES[n.type].label.toLowerCase()}]</span>
      </div>
    `).join('');
    results.style.display = 'block';
    results.querySelectorAll('.search-result').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.id;
        const n = state.nodes.find(x => x.id === id);
        if (!n) return;
        // Center view on this node
        const rect = svg.getBoundingClientRect();
        state.pan.x = rect.width / 2 - n.x * state.zoom;
        state.pan.y = rect.height / 2 - n.y * state.zoom;
        state.selectedNodeIds = new Set([id]);
        state.selectedEdgeId = null;
        render();
      });
    });
  }
  renderNodes();
}

function newProject(withExample = false) {
  state.loading = true;
  state.currentProjectId = 'proj_' + Date.now();
  state.pan = { x: 0, y: 0 };
  state.zoom = 1;
  state.undoStack = [];
  state.redoStack = [];
  state.dirty = false;
  clearSelection();
  if (withExample) {
    state.title = EXAMPLE_SEED.title;
    state.nodes = JSON.parse(JSON.stringify(EXAMPLE_SEED.nodes));
    state.edges = JSON.parse(JSON.stringify(EXAMPLE_SEED.edges));
    state.nextId = EXAMPLE_SEED.nextId;
  } else {
    state.title = 'Untitled flow';
    state.nodes = [];
    state.edges = [];
    state.nextId = 1;
  }
  save();
  state.loading = false;
  state.dirty = false;
  document.getElementById('title-input').value = state.title;
  updateUndoRedoButtons();
  renderLinkedState();
  render();
  closeProjectsModal();
}

function switchProject(id) {
  const ws = loadWorkspace();
  if (!ws.projects[id]) return;
  state.loading = true;
  const p = ws.projects[id];
  state.currentProjectId = id;
  state.title = p.title || 'Untitled';
  state.nodes = p.nodes || [];
  state.edges = p.edges || [];
  state.nextId = p.nextId || 1;
  state.pan = { x: 0, y: 0 };
  state.zoom = 1;
  state.undoStack = [];
  state.redoStack = [];
  state.dirty = !!p.dirty;
  clearSelection();
  ws.currentId = id;
  saveWorkspace(ws);
  state.loading = false;
  document.getElementById('title-input').value = state.title;
  updateUndoRedoButtons();
  renderLinkedState();
  render();
  closeProjectsModal();
}

async function deleteProject(id) {
  const ws = loadWorkspace();
  const p = ws.projects[id];
  if (!p) return;
  if (!confirm(`Delete project "${p.title}"? This cannot be undone.\n\n(Files on disk are NOT deleted — only this in-browser project record.)`)) return;
  delete ws.projects[id];
  saveWorkspace(ws);
  // Drop the linked-file handle too
  try { await dbDel('file:' + id); } catch(e) {}
  try { await dbDel('proj:' + id); } catch(e) {} // cleanup legacy directory handle key
  if (state.currentProjectId === id) {
    const remaining = Object.values(ws.projects).sort((a,b) => (b.updatedAt||0)-(a.updatedAt||0));
    if (remaining.length > 0) {
      switchProject(remaining[0].id);
    } else {
      newProject(true);
    }
  } else {
    renderProjectList();
  }
}

function renameProject(id) {
  const ws = loadWorkspace();
  const p = ws.projects[id];
  if (!p) return;
  const newName = prompt('Rename project:', p.title);
  if (newName == null) return;
  const trimmed = newName.trim() || 'Untitled flow';
  p.title = trimmed;
  saveWorkspace(ws);
  if (state.currentProjectId === id) {
    state.title = trimmed;
    document.getElementById('title-input').value = trimmed;
    renderOutput();
  }
  renderProjectList();
}

function formatRelativeDate(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const min = 60 * 1000, hr = 60 * min, day = 24 * hr;
  if (diff < min) return 'just now';
  if (diff < hr) return Math.floor(diff/min) + ' min ago';
  if (diff < day) return Math.floor(diff/hr) + ' hr ago';
  if (diff < 7 * day) return Math.floor(diff/day) + ' days ago';
  return new Date(ts).toLocaleDateString();
}

function renderProjectList() {
  const ws = loadWorkspace();
  const list = document.getElementById('project-list');
  const projects = Object.values(ws.projects).sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
  if (projects.length === 0) {
    list.innerHTML = '<li class="project-empty">No projects yet. Create one below.</li>';
    return;
  }
  list.innerHTML = projects.map(p => {
    const isCurrent = p.id === state.currentProjectId;
    const linkedName = p.linkName;
    const linkedHtml = linkedName
      ? ` · <span class="linked">📎 ${escapeHtml(linkedName)}</span>`
      : '';
    const dirtyHtml = p.dirty ? ' <span style="color:var(--accent)">•</span>' : '';
    return `
      <li class="project-item ${isCurrent ? 'current' : ''}" data-id="${p.id}">
        <div class="project-info">
          <div class="project-name">${escapeHtml(p.title)}${dirtyHtml}${isCurrent ? '<span class="badge">current</span>' : ''}</div>
          <div class="project-meta">${(p.nodes||[]).length} nodes · ${(p.edges||[]).length} connections · ${formatRelativeDate(p.updatedAt)}${linkedHtml}</div>
        </div>
        <div class="project-actions">
          ${!isCurrent ? '<button class="project-action" data-action="open">Open</button>' : ''}
          <button class="project-action" data-action="rename">Rename</button>
          <button class="project-action danger" data-action="delete">Delete</button>
        </div>
      </li>
    `;
  }).join('');
  list.querySelectorAll('.project-item').forEach(item => {
    const id = item.dataset.id;
    item.addEventListener('click', (e) => {
      if (e.target.closest('.project-action')) return;
      if (id !== state.currentProjectId) switchProject(id);
    });
    const openBtn = item.querySelector('[data-action="open"]');
    if (openBtn) openBtn.addEventListener('click', () => switchProject(id));
    item.querySelector('[data-action="rename"]').addEventListener('click', (e) => { e.stopPropagation(); renameProject(id); });
    item.querySelector('[data-action="delete"]').addEventListener('click', (e) => { e.stopPropagation(); deleteProject(id); });
  });
}
